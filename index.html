<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BV Camisas</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<header>
    <div class="logo-container">
        <!-- USA TU IMAGEN -->
        <img src="img/logo.png" alt="BV Logo">
        <h1>BV</h1>
    </div>
</header>

<section class="productos">

    <div class="producto">
        <img src="img/camisa1.jpg" alt="Camisa Casual">
        <h2>Camisa Casual</h2>
        <p>$15.00</p>
        <button onclick="comprar('Camisa Casual',15)">Comprar</button>
    </div>

    <div class="producto">
        <img src="img/camisa2.jpg" alt="Camisa Elegante">
        <h2>Camisa Elegante</h2>
        <p>$25.00</p>
        <button onclick="comprar('Camisa Elegante',25)">Comprar</button>
    </div>

    <div class="producto">
        <img src="img/camisa3.jpg" alt="Camisa Deportiva">
        <h2>Camisa Deportiva</h2>
        <p>$18.00</p>
        <button onclick="comprar('Camisa Deportiva',18)">Comprar</button>
    </div>

</section>

<script src="script.js"></script>
</body>
</html>
